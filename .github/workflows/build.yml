name: Build EZ_API

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        target:
          - name: linux-x64
            script: build:linux-x64
            binary: EZ_API_Linux_x64
            archive: EZ_API_Linux_x64.tar.gz

          - name: linux-arm64
            script: build:linux-arm64
            binary: EZ_API_Linux_arm
            archive: EZ_API_Linux_arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build binary
        run: npm run ${{ matrix.target.script }}

      - name: Prepare package
        run: |
          mkdir -p package/${{ matrix.target.name }}
          cp dist/${{ matrix.target.binary }} package/${{ matrix.target.name }}/
          [ -f app_config.json ] && cp app_config.json package/${{ matrix.target.name }}/
          [ -f config.js ] && cp config.js package/${{ matrix.target.name }}/
          [ -f index.html ] && cp index.html package/${{ matrix.target.name }}/
          [ -f routes.js ] && cp routes.js package/${{ matrix.target.name }}/
          [ -f server.js ] && cp server.js package/${{ matrix.target.name }}/
          [ -f package.json ] && cp package.json package/${{ matrix.target.name }}/
          chmod +x package/${{ matrix.target.name }}/${{ matrix.target.binary }}
          tar -czf package/${{ matrix.target.archive }} -C package/${{ matrix.target.name }} .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target.name }}
          path: package/${{ matrix.target.archive }}

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: package/${{ matrix.target.archive }}